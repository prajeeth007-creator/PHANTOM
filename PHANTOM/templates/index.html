<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>PHANTOM</title>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

<style>
:root{
    --green:#3cff00;
    --black:#0b0b0b;
    --dark:#111;
}

body{
    margin:0;
    height:100vh;
    background:var(--black);
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:Arial, sans-serif;
    color:white;
}

/* ===== MAIN CONTAINER ===== */
.container{
    width:420px;
    height:650px;
    background:var(--dark);
    border-radius:16px;
    display:flex;
    flex-direction:column;
    box-shadow:0 0 30px rgba(0,255,0,0.1);
}

/* ===== HEADER ===== */
.header{
    text-align:center;
    padding:12px;
    color:var(--green);
    border-bottom:1px solid rgba(60,255,0,0.2);
    font-weight:bold;
    letter-spacing:2px;
}

/* ===== FACE ===== */
.face-panel{
    display:flex;
    justify-content:center;
    padding:20px;
}

.face-screen{
    width:220px;
    height:180px;
    background:#a7ff83;
    border-radius:18px;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    transition:0.3s;
}

.face-screen.speaking{
    box-shadow:0 0 25px rgba(60,255,0,0.7);
}

.eyes{
    display:flex;
    gap:30px;
    margin-bottom:15px;
}

.eye{
    width:22px;
    height:22px;
    background:#111;
    border-radius:50%;
    transition:0.15s;
}

.blink{
    height:4px !important;
}

.mouth{
    width:70px;
    height:12px;
    background:#111;
    border-radius:10px;
    transition:0.2s;
}

.mouth.talking{
    height:26px;
    border-radius:14px;
}

.mouth.happy{
    height:18px;
    border-radius:0 0 40px 40px;
}

.mouth.thinking{
    width:40px;
    height:6px;
}

.mouth.listening{
    height:30px;
    width:30px;
    border-radius:50%;
}

/* ===== CHAT ===== */
.chat-box{
    flex:1;
    padding:15px;
    overflow-y:auto;
}

.botText span{
    background:#1a1a1a;
    padding:10px;
    border-radius:10px;
    display:inline-block;
}

.userText{
    text-align:right;
}

.userText span{
    background:#222;
    padding:10px;
    border-radius:10px;
    display:inline-block;
}

/* ===== INPUT ===== */
.input-area{
    padding:12px;
    border-top:1px solid rgba(60,255,0,0.2);
}

#textInput{
    width:100%;
    padding:10px;
    background:transparent;
    border:1px solid rgba(60,255,0,0.4);
    color:white;
    border-radius:8px;
}

button{
    width:100%;
    margin-top:8px;
    padding:10px;
    background:transparent;
    border:1px solid var(--green);
    color:var(--green);
    border-radius:8px;
    cursor:pointer;
}

button:hover{
    background:rgba(60,255,0,0.08);
}
</style>
</head>

<body>

<div class="container">

<div class="header">P.H.A.N.T.O.M</div>

<div class="face-panel">
    <div class="face-screen" id="face">
        <div class="eyes">
            <div class="eye" id="eyeL"></div>
            <div class="eye" id="eyeR"></div>
        </div>
        <div class="mouth neutral" id="mouth"></div>
    </div>
</div>

<div class="chat-box" id="chatbox">
    <p class="botText"><span>Phantom online.</span></p>
</div>

<div class="input-area">
    <input id="textInput" type="text" placeholder="Speak or type...">
    <button onclick="sendMessage()">Send</button>
    <button id="micButton">🎤 Speak</button>
</div>

</div>

<script>
const mouth = document.getElementById("mouth");
const eyeL = document.getElementById("eyeL");
const eyeR = document.getElementById("eyeR");
const face = document.getElementById("face");

function setExpression(type){
    mouth.className = "mouth " + type;
}

function setSpeaking(on){
    if(on){
        face.classList.add("speaking");
        mouth.classList.add("talking");
    }else{
        face.classList.remove("speaking");
        mouth.classList.remove("talking");
        setExpression("neutral");
    }
}

/* ===== BLINK ===== */
setInterval(()=>{
    eyeL.classList.add("blink");
    eyeR.classList.add("blink");
    setTimeout(()=>{
        eyeL.classList.remove("blink");
        eyeR.classList.remove("blink");
    },150);
},3000);

/* ===== SEND MESSAGE ===== */
function sendMessage(){
    let text = $("#textInput").val();
    if(text === "") return;

    $("#chatbox").append('<p class="userText"><span>'+text+'</span></p>');
    $("#textInput").val("");

    $.get("/get",{ userMessage:text }).done(function(data){
        $("#chatbox").append('<p class="botText"><span>'+data+'</span></p>');
        $("#chatbox").scrollTop($("#chatbox")[0].scrollHeight);

        setExpression(emotionFromText(data));
        speak(data);
    });
}

$("#textInput").keypress(function(e){
    if(e.which == 13) sendMessage();
});

/* ===== EMOTION ===== */
function emotionFromText(text){
    text = text.toLowerCase();
    if(text.includes("hello") || text.includes("hi")) return "happy";
    if(text.includes("think") || text.includes("hmm")) return "thinking";
    return "neutral";
}

/* ===== TEXT TO SPEECH ===== */
function speak(text){
    const speech = new SpeechSynthesisUtterance(text);
    setSpeaking(true);
    speech.onend = () => setSpeaking(false);
    speechSynthesis.speak(speech);
}

/* ===== VOICE INPUT ===== */
const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
const recognition = new SpeechRecognition();
recognition.lang = "en-US";

$("#micButton").click(function(){
    setExpression("listening");
    recognition.start();
});

recognition.onresult = function(event){
    let voiceText = event.results[0][0].transcript;
    $("#textInput").val(voiceText);
    sendMessage();
};

recognition.onend = function(){
    setExpression("neutral");
};
</script>

</body>
</html>
